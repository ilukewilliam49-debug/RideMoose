    <!-- Pre-mount paint: match app background immediately so reloads never
         flash white before CSS/JS finish loading. Values mirror the
         --background token in src/index.css (hsl(222 40% 7%)). -->
    <style>
      html, body { background-color: hsl(222, 40%, 7%); margin: 0; }
      #root { min-height: 100vh; background-color: hsl(222, 40%, 7%); }
      #initial-loader {
        position: fixed; inset: 0; display: flex; align-items: center;
        justify-content: center; background-color: hsl(222, 40%, 7%);
        z-index: 9999; transition: opacity 0.3s ease-out;
      }
      #initial-loader.hidden { opacity: 0; pointer-events: none; }
      #initial-loader .dot {
        width: 10px; height: 10px; border-radius: 9999px;
        background-color: hsl(213, 84%, 56%); margin: 0 4px;
        animation: pickyou-pulse 1s infinite ease-in-out;
      }
      #initial-loader .dot:nth-child(2) { animation-delay: 0.2s; }
      #initial-loader .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pickyou-pulse {
        0%, 100% { opacity: 0.3; } 50% { opacity: 1; }
      }
    </style>
